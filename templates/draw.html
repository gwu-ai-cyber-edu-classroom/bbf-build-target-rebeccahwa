{% extends "base.html" %}
{% block content %}
<h1>New drawing</h1>

<form method="post" action="{{ url_for('save') }}" id="saveForm">
  <label for="title">Title</label>
  <input type="text" id="title" name="title" placeholder="My masterpiece">

  <p style="margin-top:1rem">
    <canvas id="pad" width="700" height="450"></canvas>
  </p>

  <p>
    Brush:
    <input type="color" id="color" value="#222222">
    <input type="range" id="size" min="1" max="40" value="4">
    <button type="button" id="clear">Clear</button>
    <input type="submit" value="Save picture">
  </p>

  <input type="hidden" name="image" id="image">
</form>

<script>
  const canvas = document.getElementById('pad');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false, last = null;
  const colorEl = document.getElementById('color');
  const sizeEl = document.getElementById('size');

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - r.left, y: p.clientY - r.top };
  }
  function start(e) { drawing = true; last = pos(e); e.preventDefault(); }
  function move(e) {
    if (!drawing) return;
    const p = pos(e);
    ctx.strokeStyle = colorEl.value;
    ctx.lineWidth = sizeEl.value;
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last = p;
    e.preventDefault();
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', end);

  document.getElementById('clear').addEventListener('click', () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });

  document.getElementById('saveForm').addEventListener('submit', () => {
    document.getElementById('image').value = canvas.toDataURL('image/png');
  });
</script>
{% endblock %}
